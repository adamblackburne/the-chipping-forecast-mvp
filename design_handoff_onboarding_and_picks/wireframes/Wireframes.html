  <title>The Chipping Forecast · Wireframes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;700&family=Architects+Daughter&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
/* ─────────────────────────────────────────────────────────
   The Chipping Forecast — Wireframes
   Tidy lo-fi. Black ink on off-white. One accent = muted green.
   ───────────────────────────────────────────────────────── */

:root {
  --paper: #FAF8F3;
  --paper-2: #F1EEE4;
  --ink: #1A1A1A;
  --ink-2: #4A4A4A;
  --ink-3: #8A8A8A;
  --line: #1A1A1A;
  --line-soft: #C9C5BA;
  --accent: #4A6B4A;       /* muted fairway green */
  --accent-soft: #DDE5D8;
  --warn: #A86B3C;         /* muted terracotta, for highlights only */
  --warn-soft: #EADDCB;
  --radius: 6px;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--paper);
  color: var(--ink);
  font-family: 'Caveat', 'Kalam', cursive;
  /* body uses handwriting as accent; UI uses Architects Daughter */
}

body {
  font-family: 'Architects Daughter', 'Caveat', sans-serif;
  font-size: 15px;
  line-height: 1.4;
  /* paper grain */
  background-image:
    radial-gradient(circle at 20% 10%, rgba(0,0,0,0.015) 1px, transparent 1px),
    radial-gradient(circle at 70% 40%, rgba(0,0,0,0.012) 1px, transparent 1px),
    radial-gradient(circle at 40% 80%, rgba(0,0,0,0.01) 1px, transparent 1px);
  background-size: 23px 23px, 31px 31px, 17px 17px;
}

/* ── Typography ───────────────────────────────────────── */
.hand { font-family: 'Caveat', cursive; }
.mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

h1, h2, h3 {
  font-family: 'Caveat', cursive;
  font-weight: 700;
  letter-spacing: 0.5px;
  margin: 0;
}
h1 { font-size: 56px; line-height: 1; }
h2 { font-size: 32px; line-height: 1; }
h3 { font-size: 22px; line-height: 1.1; }

/* ── Layout shell ─────────────────────────────────────── */
.page {
  max-width: 1680px;
  margin: 0 auto;
  padding: 48px 40px 120px;
}

.masthead {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 32px;
  padding-bottom: 24px;
  border-bottom: 2px solid var(--ink);
  margin-bottom: 32px;
}
.masthead .title { display: flex; align-items: baseline; gap: 18px; }
.masthead h1 { font-size: 68px; }
.masthead .sub {
  font-family: 'Architects Daughter', sans-serif;
  font-size: 13px;
  color: var(--ink-2);
  max-width: 520px;
  text-align: right;
}
.masthead .stamp {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  border: 1.5px solid var(--ink);
  padding: 4px 8px;
  transform: rotate(-2deg);
  background: var(--paper-2);
}

/* ── Section ──────────────────────────────────────────── */
.section { margin-top: 64px; }
.section-head {
  display: flex;
  align-items: baseline;
  gap: 14px;
  margin-bottom: 24px;
}
.section-head .num {
  font-family: 'Caveat', cursive;
  font-size: 40px;
  color: var(--ink-3);
  line-height: 1;
}
.section-head h2 { font-size: 36px; }
.section-head .note {
  font-family: 'Architects Daughter', sans-serif;
  font-size: 12px;
  color: var(--ink-2);
  margin-left: auto;
}

/* ── Storyboard row ───────────────────────────────────── */
.storyboard {
  display: flex;
  gap: 28px;
  align-items: flex-start;
  overflow-x: auto;
  padding-bottom: 16px;
}
.story-step { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; gap: 8px; }
.story-step .caption {
  font-family: 'Caveat', cursive;
  font-size: 22px;
  text-align: center;
  max-width: 260px;
  line-height: 1.1;
}
.story-step .step-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--ink-3);
}
.story-step .role-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 2px 7px;
  border: 1px solid var(--ink);
}
.role-host { background: var(--warn-soft); }
.role-joiner { background: var(--accent-soft); }

.arrow {
  align-self: center;
  flex-shrink: 0;
  margin-top: 180px;
  color: var(--ink-2);
}

/* ── Variations row ───────────────────────────────────── */
.variations {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 32px;
  margin-top: 8px;
}
.variation {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}
.variation .var-label {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.variation .var-label .name {
  font-family: 'Caveat', cursive;
  font-size: 26px;
  line-height: 1;
}
.variation .var-label .desc {
  font-family: 'Architects Daughter', sans-serif;
  font-size: 12px;
  color: var(--ink-2);
  text-align: center;
  max-width: 280px;
}

/* ── Phone frame ──────────────────────────────────────── */
.phone {
  width: 300px;
  height: 620px;
  border: 2.5px solid var(--ink);
  border-radius: 38px;
  background: var(--paper);
  padding: 10px;
  position: relative;
  box-shadow: 3px 4px 0 rgba(0,0,0,0.08);
}
.phone::before {
  content: '';
  position: absolute;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  width: 90px;
  height: 22px;
  background: var(--ink);
  border-radius: 12px;
  z-index: 2;
}
.phone-screen {
  width: 100%;
  height: 100%;
  border: 1.5px solid var(--ink);
  border-radius: 28px;
  overflow: hidden;
  background: var(--paper);
  position: relative;
  display: flex;
  flex-direction: column;
}
.phone-lg {
  width: 340px;
  height: 700px;
}
.phone-lg .phone-screen { border-radius: 30px; }

/* status bar inside screen */
.statusbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 22px 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-2);
  flex-shrink: 0;
}
.statusbar .dots { display: flex; gap: 3px; }
.statusbar .dots span { width: 3px; height: 3px; background: var(--ink-2); border-radius: 50%; display: inline-block; }

/* top bar (title + action) */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 18px 10px;
  border-bottom: 1px dashed var(--line-soft);
  flex-shrink: 0;
}
.topbar .back {
  font-family: 'Caveat', cursive;
  font-size: 22px;
}
.topbar .screen-title {
  font-family: 'Caveat', cursive;
  font-size: 22px;
  font-weight: 700;
}
.topbar .action {
  font-family: 'Architects Daughter', sans-serif;
  font-size: 12px;
  color: var(--accent);
}

/* generic content area */
.screen-body {
  flex: 1;
  padding: 14px 18px;
  overflow-y: auto;
  min-height: 0;
}
.screen-body.pad-lg { padding: 22px; }
.screen-body.center {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  gap: 16px;
}

/* bottom tab bar */
.tabbar {
  display: flex;
  justify-content: space-around;
  align-items: center;
  border-top: 1.5px solid var(--ink);
  padding: 8px 0 16px;
  flex-shrink: 0;
  background: var(--paper-2);
}
.tabbar .tab {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  font-family: 'Architects Daughter', sans-serif;
  font-size: 10px;
  color: var(--ink-3);
}
.tabbar .tab.active { color: var(--ink); }
.tabbar .tab .icon {
  width: 18px; height: 18px;
  border: 1.5px solid currentColor;
  border-radius: 3px;
}

/* ── Primitives ───────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  font-family: 'Caveat', cursive;
  font-size: 22px;
  padding: 10px 16px;
  border: 2px solid var(--ink);
  border-radius: 10px;
  background: var(--paper);
  line-height: 1;
}
.btn.primary { background: var(--ink); color: var(--paper); }
.btn.accent { background: var(--accent); color: var(--paper); border-color: var(--accent); }
.btn.full { width: 100%; }
.btn.sm { font-size: 16px; padding: 6px 10px; }

.input {
  border: 1.5px solid var(--ink);
  border-radius: 8px;
  padding: 10px 12px;
  background: var(--paper);
  font-family: 'Caveat', cursive;
  font-size: 22px;
  line-height: 1;
  width: 100%;
}
.input.mono { font-family: 'JetBrains Mono', monospace; font-size: 18px; letter-spacing: 2px; text-align: center; }
.input .label {
  font-family: 'Architects Daughter', sans-serif;
  font-size: 11px;
  color: var(--ink-2);
}
.field {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.field > label {
  font-family: 'Architects Daughter', sans-serif;
  font-size: 11px;
  color: var(--ink-2);
  text-transform: uppercase;
  letter-spacing: 1.2px;
}

.chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-family: 'Architects Daughter', sans-serif;
  font-size: 11px;
  padding: 3px 8px;
  border: 1px solid var(--ink);
  border-radius: 100px;
  background: var(--paper);
  line-height: 1;
}
.chip.accent { background: var(--accent-soft); border-color: var(--accent); }
.chip.warn { background: var(--warn-soft); border-color: var(--warn); }
.chip.solid { background: var(--ink); color: var(--paper); }

.divider-hand {
  height: 8px;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 8' preserveAspectRatio='none'><path d='M0 4 Q 25 1 50 4 T 100 4' stroke='%231A1A1A' stroke-width='1' fill='none'/></svg>");
  background-repeat: repeat-x;
  background-size: 100px 8px;
}

.tier-label {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--ink-2);
  padding: 2px 0;
}
.tier-label::before {
  content: '';
  width: 14px; height: 2px; background: var(--ink);
}

/* golfer row */
.golfer-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 4px;
  border-bottom: 1px dashed var(--line-soft);
}
.golfer-row:last-child { border-bottom: 0; }
.golfer-row .avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--paper-2);
  border: 1.5px solid var(--ink);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Caveat', cursive;
  font-size: 12px;
}
.golfer-row .rank {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--ink-2);
  min-width: 20px;
}
.golfer-row .name {
  flex: 1;
  font-family: 'Architects Daughter', sans-serif;
  font-size: 13px;
}
.golfer-row .meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-3);
}
.golfer-row.picked {
  background: var(--accent-soft);
  border-radius: 4px;
  padding: 8px 6px;
}
.golfer-row .pick-dot {
  width: 16px; height: 16px; border: 1.5px solid var(--ink);
  border-radius: 50%; flex-shrink: 0;
}
.golfer-row.picked .pick-dot { background: var(--accent); border-color: var(--accent); }

/* annotation callout */
.annotation {
  font-family: 'Caveat', cursive;
  font-size: 20px;
  color: var(--ink-2);
  line-height: 1.1;
  max-width: 200px;
  position: relative;
}
.annotation.arrow-left::before {
  content: '';
  position: absolute;
  left: -28px; top: 10px;
  width: 24px; height: 14px;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 14'><path d='M1 7 Q 8 2 20 7 M 15 4 L 20 7 L 16 11' stroke='%234A4A4A' stroke-width='1.2' fill='none' stroke-linecap='round'/></svg>");
  background-repeat: no-repeat;
}

/* tabs (flow presentation) */
.section-tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 20px;
  border-bottom: 1.5px solid var(--ink);
}
.section-tabs button {
  background: transparent;
  border: 1.5px solid var(--ink);
  border-bottom: 0;
  font-family: 'Caveat', cursive;
  font-size: 22px;
  padding: 6px 14px;
  cursor: pointer;
  color: var(--ink-2);
  border-radius: 8px 8px 0 0;
  margin-bottom: -1.5px;
}
.section-tabs button.active {
  color: var(--ink);
  background: var(--paper);
  border-bottom: 1.5px solid var(--paper);
}

/* progress dots for tier wizard */
.wizard-dots {
  display: flex;
  gap: 6px;
  justify-content: center;
  padding: 6px 0;
}
.wizard-dots .dot {
  width: 10px; height: 10px; border-radius: 50%;
  border: 1.5px solid var(--ink);
  background: var(--paper);
}
.wizard-dots .dot.done { background: var(--ink); }
.wizard-dots .dot.active { background: var(--accent); border-color: var(--accent); }

/* scribble underline */
.scribble {
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 80 6' preserveAspectRatio='none'><path d='M1 3 Q 20 0 40 3 T 79 3' stroke='%234A6B4A' stroke-width='2' fill='none'/></svg>");
  background-repeat: no-repeat;
  background-position: 0 100%;
  background-size: 100% 5px;
  padding-bottom: 4px;
}

/* grid tiles */
.tile {
  border: 1.5px solid var(--ink);
  border-radius: 8px;
  padding: 10px;
  background: var(--paper);
}
.tile-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 6px;
}

/* Shared helpers */
.row { display: flex; gap: 8px; align-items: center; }
.col { display: flex; flex-direction: column; gap: 8px; }
.stack-4 > * + * { margin-top: 4px; }
.stack-8 > * + * { margin-top: 8px; }
.stack-12 > * + * { margin-top: 12px; }
.stack-16 > * + * { margin-top: 16px; }
.muted { color: var(--ink-2); }
.tiny { font-family: 'Architects Daughter', sans-serif; font-size: 11px; color: var(--ink-2); }
.center-txt { text-align: center; }

/* keyboard hint */
.kb-hint {
  position: absolute;
  bottom: 6px; left: 50%;
  transform: translateX(-50%);
  width: 44px; height: 4px;
  background: var(--ink);
  border-radius: 2px;
  opacity: 0.3;
}

</style>

  return (

      {roleTag && (
        <div className={`role-tag role-${roleTag.toLowerCase()}`}>{roleTag}</div>

      {caption && <div className="caption">{caption}</div>}
      {annotation && <div className="annotation arrow-left" style={{ marginTop: 8 }}>{annotation}</div>}
    </div>
  );
}

function StatusBar() {
  return (

  );
}

      <span className="screen-title">{title}</span>
      <span className="action">{action || ''}</span>

  );
}

  );
}

  );
}

<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect } = React;

    function App() {
      // Persist tab choice
      const [view, setView] = useState(() => localStorage.getItem('cf_view') || 'flow');
      useEffect(() => { localStorage.setItem('cf_view', view); }, [view]);

      return (
        <div className="page">
          <header className="masthead">
            <div className="title">
              <h1>The Chipping Forecast</h1>
              <span className="stamp">Wireframes v1</span>
            </div>
            <div className="sub">
              Lightweight golf prediction game. No accounts. 4 picks per player,
              one per world-ranking tier. Lowest combined finish wins.
            </div>
          </header>

          <div className="section-tabs">
            <button
              className={view === 'flow' ? 'active' : ''}
              onClick={() => setView('flow')}>Happy path</button>
            <button
              className={view === 'variations' ? 'active' : ''}
              onClick={() => setView('variations')}>Screen variations</button>
            <button
              className={view === 'system' ? 'active' : ''}
              onClick={() => setView('system')}>Notes & system</button>
          </div>

          {view === 'flow' && <FlowView />}
          {view === 'variations' && <VariationsView />}
          {view === 'system' && <SystemView />}

          <footer style={{
            marginTop: 80, paddingTop: 20, borderTop: '1px dashed var(--line-soft)',
            fontFamily: 'Architects Daughter, sans-serif', fontSize: 12, color: 'var(--ink-3)',
          }}>
            wireframes · marked up in tidy lo-fi · not final visuals
          </footer>
        </div>
      );
    }

    function FlowView() {
      return (
        <Section num="→" title="Happy path" note="6 frames, host + joiner, landing to locked-in">
          <Storyboard />
          <div style={{ marginTop: 32, padding: 16, border: '1.5px dashed var(--line-soft)', borderRadius: 8, background: 'var(--paper-2)' }}>
            <div className="hand" style={{ fontSize: 20, fontWeight: 700 }}>Flow notes</div>
            <ul style={{ fontSize: 13, paddingLeft: 20, marginTop: 6, lineHeight: 1.6 }}>
              <li><b>Host & joiner diverge</b> at step 02, then rejoin at 03 (name + save link).</li>
              <li><b>The "save your link" moment</b> is the highest-risk screen — if users skip it, they lose access. See variations for handling.</li>
              <li><b>Picks screen</b> is the core interaction. Everything else should get out of its way.</li>
              <li><b>Locked-in</b> is a holding state — it becomes the home screen until reveal.</li>
              <li>Not shown yet: reveal, live leaderboard, my-picks detail, finished. Next pass.</li>
            </ul>
          </div>
        </Section>
      );
    }

    function VariationsView() {
      return (
        <>
          {VARIATIONS.map((screen, i) => (
            <Section key={i} num={screen.num} title={screen.title} note={screen.note}>
              <div className="variations">
                {screen.options.map((opt, j) => (
                  <Variation key={j} name={opt.name} desc={opt.desc}>
                    <div className="phone phone-lg">
                      <div className="phone-screen">
                        <opt.Screen />
                      </div>
                    </div>
                    <div className="tiny" style={{
                      fontFamily: 'JetBrains Mono, monospace', fontSize: 9,
                      letterSpacing: 1.5, textTransform: 'uppercase',

                      explores: {opt.focus}

              </div>
            </Section>
          ))}
        </>
      );
    }

    function SystemView() {
      return (
        <>
          <Section num="✎" title="System & decisions" note="working notes, to firm up with you">
            <div style={{
              display: 'grid',
              gridTemplateColumns: 'repeat(2, 1fr)',

              <div className="tile" style={{ padding: 18 }}>
                <div className="hand" style={{ fontSize: 26, fontWeight: 700 }}>Core loop</div>
                <ol style={{ fontSize: 14, lineHeight: 1.6, paddingLeft: 20 }}>
                  <li>Host creates group → gets 6-char code</li>
                  <li>Each friend opens link / enters code → picks name</li>
                  <li>Everyone picks 4 golfers (1 per tier) — hidden</li>
                  <li>1hr before tee-off: picks reveal, leaderboard goes live</li>
                  <li>During play: leaderboard updates as positions change</li>
                  <li>Tournament ends: lowest combined finish wins</li>
                </ol>
              </div>
              <div className="tile" style={{ padding: 18 }}>
                <div className="hand" style={{ fontSize: 26, fontWeight: 700 }}>Wireframe palette</div>
                <div className="stack-8" style={{ fontSize: 13, marginTop: 8 }}>
                  <Swatch color="#1A1A1A" name="ink · all structure" />
                  <Swatch color="#FAF8F3" name="paper · background" />
                  <Swatch color="#DDE5D8" name="fairway (accent soft)" />
                  <Swatch color="#4A6B4A" name="fairway (accent)" />
                  <Swatch color="#EADDCB" name="flag (warn soft)" />
                  <Swatch color="#A86B3C" name="flag (warn)" />
                </div>
                <div className="tiny muted" style={{ marginTop: 10 }}>
                  Kept intentionally restrained — wireframes are about structure, not skin.
                </div>
              </div>
              <div className="tile" style={{ padding: 18 }}>
                <div className="hand" style={{ fontSize: 26, fontWeight: 700 }}>Open questions</div>
                <ul style={{ fontSize: 13, lineHeight: 1.6, paddingLeft: 20 }}>
                  <li>What happens if a golfer misses the cut? Penalty score vs. fixed last-place?</li>
                  <li>Can a user change picks right up to deadline, or lock on submit?</li>
                  <li>Does the host pick the tournament, or is it auto-chosen per week?</li>
                  <li>Ties on total score — who wins? (e.g., lowest single-tier pick)</li>
                  <li>Withdraws / disqualifications: how scored?</li>
                  <li>Multiple tournaments per group — season mode?</li>
                </ul>
              </div>
              <div className="tile" style={{ padding: 18 }}>
                <div className="hand" style={{ fontSize: 26, fontWeight: 700 }}>Screens not yet drawn</div>
                <ul style={{ fontSize: 13, lineHeight: 1.6, paddingLeft: 20 }}>
                  <li><b>Reveal moment</b> — the card-flip when picks go public</li>
                  <li><b>Live leaderboard</b> — numbers-first table + visual chip view</li>
                  <li><b>Player detail</b> — my 4 picks with live positions</li>
                  <li><b>Finished / winner</b> — celebratory end state</li>
                  <li><b>Returning via personal link</b> — "welcome back" state</li>
                </ul>
                <div className="tiny muted" style={{ marginTop: 8 }}>
                  Next pass. Happy to wireframe these once we pick a direction on the first 6.
                </div>
              </div>
            </div>
          </Section>
        </>
      );
    }

    function Swatch({ color, name }) {
      return (
        <div className="row">
          <div style={{ width: 20, height: 20, background: color, border: '1px solid var(--ink)', borderRadius: 3 }} />
          <span style={{ fontFamily: 'Architects Daughter, sans-serif', fontSize: 12 }}>{name}</span>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
